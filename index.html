<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>공랭식 냉각 팬 시뮬레이터</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style> body { margin: 0; background-color: #1e1e1e; display: flex; justify-content: center; align-items: center; height: 100vh; } </style>
</head>
<body>
<script>
let particles = [];
let fanAngle = 0;
let fanSpeed = 0.05;
let fanX, fanY, fanRadius = 80;

function setup() {
    createCanvas(800, 600);
    fanX = width / 4;
    fanY = height / 2;
}

function draw() {
    background(30);
    
    // 입자 생성
    if (particles.length < 250) {
        particles.push(new AirParticle());
    }
    
    // 팬 회전 및 그리기
    fanAngle += fanSpeed;
    noFill();
    stroke(100);
    strokeWeight(2);
    ellipse(fanX, fanY, fanRadius * 2);
    
    stroke(200);
    strokeWeight(5);
    for (let i = 0; i < 4; i++) {
        let angle = fanAngle + (i * HALF_PI);
        let bx = fanX + fanRadius * cos(angle);
        let by = fanY + fanRadius * sin(angle);
        line(fanX, fanY, bx, by);
    }
    
    // 입자 업데이트 및 렌더링
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].display();
        if (!particles[i].active) {
            particles.splice(i, 1);
        }
    }
}

class AirParticle {
    constructor() {
        this.x = random(fanX - 20, fanX + 20);
        this.y = random(fanY - fanRadius, fanY + fanRadius);
        this.vx = 0;
        this.vy = 0;
        this.color = color(173, 216, 230);
        this.active = true;
    }
    
    update() {
        let dx = this.x - fanX;
        let dy = this.y - fanY;
        let distance = sqrt(dx*dx + dy*dy);
        
        // 물리학2 법칙 적용 (벡터 성분 분해 및 합)
        if (distance < fanRadius + 10 && this.active) {
            // 접선 속도 벡터 (매개변수 원운동 미분 모델 적용)
            let v_rot_x = -dy * fanSpeed;
            let v_rot_y = dx * fanSpeed;
            
            // 축 방향 속도 벡터 (우측 방향)
            let v_ax_x = 5.0;
            
            // 기하: 평면벡터의 합 (v = v_rot + v_ax)
            this.vx = v_rot_x + v_ax_x;
            this.vy = v_rot_y;
            this.color = color(255, 100, 100); // 에너지 획득 시각화
        }
        
        this.x += this.vx;
        this.y += this.vy;
        
        if (this.x > width) this.active = false;
    }
    
    display() {
        noStroke();
        fill(this.color);
        ellipse(this.x, this.y, 6);
    }
}
</script>
</body>
</html>
